version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: coursework_mysql
    environment:
      MYSQL_ROOT_PASSWORD: '123456'
      MYSQL_DATABASE: 'booking_system'
      TZ: 'UTC'
    ports:
      - '3306:3306'
    volumes:
      # 将初始化 SQL 脚本挂载到 MySQL 的初始化目录中，这样容器首次启动时会自动执行建表语句
      - ./database/sql语句.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  redis:
    image: redis:alpine
    container_name: coursework_redis
    ports:
      - '6379:6379'
    restart: unless-stopped
